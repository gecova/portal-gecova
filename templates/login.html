<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GECOVA — Iniciar sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #094F68;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }
    .logo-box {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-box img { height: 56px; width: auto; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 36px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .card h2 {
      font-size: 18px; font-weight: 800; color: #094F68;
      margin-bottom: 4px;
    }
    .card p {
      font-size: 12px; color: #7a8a96; font-weight: 500;
      margin-bottom: 28px;
    }
    .form-group { margin-bottom: 16px; }
    label {
      display: block; font-size: 10px; font-weight: 700;
      letter-spacing: 0.8px; text-transform: uppercase;
      color: #7a8a96; margin-bottom: 6px;
    }
    input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #dde6ec; border-radius: 8px;
      font-size: 14px; font-family: inherit; color: #1a2530;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #79C4DB; box-shadow: 0 0 0 3px rgba(121,196,219,0.15); }
    .btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #FA6101, #d95200);
      color: white; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 800; font-family: inherit;
      cursor: pointer; margin-top: 8px; letter-spacing: 0.3px;
      transition: all 0.2s;
    }
    .btn:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(250,97,1,0.35); }
    .error {
      background: #fdecea; color: #a32d2d; border: 1px solid #f5c2c2;
      border-radius: 8px; padding: 10px 14px; font-size: 12px;
      font-weight: 600; margin-bottom: 16px;
    }
    .footer-text {
      text-align: center; margin-top: 20px;
      font-size: 11px; color: rgba(255,255,255,0.5); font-weight: 500;
    }
  </style>
</head>
